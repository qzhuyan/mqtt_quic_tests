name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use stable Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Check formatting
        run: cargo fmt --check

      - name: Test
        run: cargo test --locked --all-targets

  emqx:
    name: EMQX QUIC Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      EMQX_IMAGE: emqx/emqx:5.10.4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use stable Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Run EMQX QUIC smoke scenarios
        run: bash ci/emqx-smoke.sh

