name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update.
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - asset: linux-aarch64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - asset: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
          - asset: macos-aarch64
            os: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use stable Rust
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --bin mqtt_quic_test --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          asset="mqtt_quic_test-${{ matrix.asset }}"
          mkdir -p "dist/${asset}"
          cp "target/${{ matrix.target }}/release/mqtt_quic_test" "dist/${asset}/"
          tar -C dist -czf "${asset}.tar.gz" "${asset}"
          shasum -a 256 "${asset}.tar.gz" > "${asset}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mqtt_quic_test-${{ matrix.asset }}
          path: |
            mqtt_quic_test-${{ matrix.asset }}.tar.gz
            mqtt_quic_test-${{ matrix.asset }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --target "$GITHUB_SHA" --title "$RELEASE_TAG" --generate-notes
          fi
